<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchtower | Node Dashboard</title>
    
    <!-- Fonts & Supabase CDN -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --black: #080c0f;
            --dark: #0d1318;
            --panel: #111820;
            --border: #1e2d3a;
            --green: #00ff88;
            --green-dim: #00cc6a;
            --amber: #ffaa00;
            --red: #ff4455;
        }

        body {
            background-color: var(--black);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-panel {
            width: 100%;
            max-width: 800px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h2 {
            font-family: 'Share Tech Mono', monospace;
            color: var(--green);
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .tier-badge {
            display: inline-block;
            background: var(--dark);
            color: var(--amber);
            border: 1px solid var(--amber);
            padding: 5px 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-box {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 30px 20px;
            text-align: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .stat-box h3 {
            font-family: 'Share Tech Mono', monospace;
            color: #888;
            margin-top: 0;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .value {
            font-family: 'Share Tech Mono', monospace;
            font-size: 3.5rem;
            margin: 15px 0;
            color: var(--green);
            text-shadow: 0 0 10px rgba(0,255,136,0.2);
        }

        .disposal-value {
            color: var(--amber);
            text-shadow: 0 0 10px rgba(255,170,0,0.2);
        }

        .stat-desc {
            font-size: 0.9rem;
            color: #aaa;
            margin: 0;
            line-height: 1.4;
        }

        .actions {
            width: 100%;
            max-width: 800px;
            margin-top: 40px;
            text-align: right;
        }

        button {
            background: transparent;
            border: 1px solid var(--red);
            color: var(--red);
            padding: 10px 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--red);
            color: var(--black);
        }
    </style>
</head>
<body>

    <div class="header-panel">
        <h2>NODE STATUS: <span id="node-name">LOADING SYSTEM...</span></h2>
        <div class="tier-badge" id="node-tier">VERIFYING...</div>
    </div>

    <div class="grid">
        <div class="stat-box">
            <h3>WTWR REDEEMED</h3>
            <div class="value" id="wtwr-val">0.00</div>
            <p class="stat-desc">Total localized Watchtower bounty value circulated through this node.</p>
        </div>
        <div class="stat-box">
            <h3>DISPOSAL OFFSET</h3>
            <div class="value disposal-value" id="disposal-val">$0.00</div>
            <p class="stat-desc">Estimated commercial waste management overhead saved via diversion.</p>
        </div>
    </div>

    <div class="actions">
        <button id="logout-btn">Terminate Connection</button>
    </div>

    <script>
        // ==========================================
        // SYSTEM PRE-LOADED WITH YOUR CREDENTIALS
        // ==========================================
        const supabaseUrl = 'https://eypovuxuddiqgncjdpkq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5cG92dXh1ZGRpcWduY2pkcGtxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MzU1NDgsImV4cCI6MjA5ODUxMTU0OH0.JLSmCx7bZe7yIxxdXZwCWrLeyV1zAoPTXbSP24IckBY';
        
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function enforceAuth() {
            // 1. Verify active session. If none, kick them back to the gate.
            const { data: { session }, error: sessionError } = await supabase.auth.getSession();
            
            if (!session || sessionError) {
                window.location.replace('business.html');
                return;
            }

            // 2. Fetch Business Data from the ledger using their authenticated ID
            const { data: business, error } = await supabase
                .from('businesses')
                .select('*')
                .eq('auth_id', session.user.id)
                .single();

            if (error) {
                console.error("Error fetching node ledger:", error);
                document.getElementById('node-name').innerText = "SYSTEM ERROR";
                document.getElementById('node-tier').innerText = "DATA UNAVAILABLE";
                return;
            }

            // 3. Inject ledger data into the dashboard UI
            if (business) {
                document.getElementById('node-name').innerText = business.business_name.toUpperCase();
                document.getElementById('node-tier').innerText = business.tier.toUpperCase() + " TIER";
                
                // Format the numbers
                document.getElementById('wtwr-val').innerText = Number(business.wtwr_redeemed).toFixed(2);
                document.getElementById('disposal-val').innerText = '$' + Number(business.disposal_cost_saved).toFixed(2);
            }
        }

        // 4. Terminate Session Logic
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.replace('business.html');
        });

        // Execute authorization check immediately on page load
        window.addEventListener('load', enforceAuth);
    </script>
</body>
</html>
