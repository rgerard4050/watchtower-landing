<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchtower | Node Registration</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --black: #080c0f;
            --dark: #0d1318;
            --panel: #111820;
            --border: #1e2d3a;
            --green: #00ff88;
            --green-glow: rgba(0,255,136,0.10);
            --amber: #ffaa00;
        }

        body {
            background-color: var(--black);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        h2 {
            font-family: 'Share Tech Mono', monospace;
            color: var(--green);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        #formwrap {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        #formwrap.submitted {
            border-color: var(--green);
            box-shadow: 0 0 20px var(--green-glow);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-family: 'Share Tech Mono', monospace;
            color: var(--amber);
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: var(--dark);
            border: 1px solid var(--border);
            color: var(--green);
            font-family: 'Share Tech Mono', monospace;
            box-sizing: border-box;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 10px var(--green-glow);
        }

        button {
            width: 100%;
            background: var(--black);
            border: 1px solid var(--green);
            color: var(--green);
            padding: 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--green);
            color: var(--black);
        }

        .auth-notice {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="formwrap">
        <h2>Initialize Node</h2>
        
        <div class="input-group">
            <label>Business Name</label>
            <input type="text" id="biz" placeholder="Ocala Asset Security" required>
        </div>

        <div class="input-group">
            <label>Contact Name</label>
            <input type="text" id="name" placeholder="Primary Operator" required>
        </div>

        <div class="input-group">
            <label>Node Email (Login ID)</label>
            <input type="email" id="email" placeholder="admin@ocala-business.com" required>
        </div>

        <div class="input-group">
            <label>Node Passkey</label>
            <input type="password" id="password" placeholder="Min. 6 characters" required>
        </div>

        <div class="input-group">
            <label>Contact Phone</label>
            <input type="text" id="phone" placeholder="(352) 555-0199">
        </div>

        <div class="input-group">
            <label>Requested Tier</label>
            <select id="ctier">
                <option value="Signal">Signal - $1,000/yr</option>
                <option value="Enforcer">Enforcer - $2,500/yr</option>
                <option value="Sentinel">Sentinel - $5,000/yr</option>
            </select>
        </div>

        <div class="input-group">
            <label>Operational Notes</label>
            <textarea id="cnotes" rows="3" placeholder="Additional logistics details..."></textarea>
        </div>

        <button id="submit-btn" onclick="handleSubmit()">Provision Node</button>
        <div class="auth-notice">Registered nodes will be routed to the secure dashboard.</div>
    </div>

    <script>
        // ==========================================
        // SYSTEM PRE-LOADED WITH YOUR CREDENTIALS
        // ==========================================
        const supabaseUrl = 'https://eypovuxuddiqgncjdpkq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5cG92dXh1ZGRpcWduY2pkcGtxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MzU1NDgsImV4cCI6MjA5ODUxMTU0OH0.JLSmCx7bZe7yIxxdXZwCWrLeyV1zAoPTXbSP24IckBY';
        
        // FIX: Renamed variable to 'supabaseClient' to avoid crashing the script
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // ==========================================
        // THE AUTH & DATABASE SUBMISSION LOGIC
        // ==========================================
        async function handleSubmit() {
            const bizName = document.getElementById('biz').value.trim();
            const contactName = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const phone = document.getElementById('phone').value.trim();
            const tier = document.getElementById('ctier').value;
            const notes = document.getElementById('cnotes').value.trim();
            const btn = document.getElementById('submit-btn');
            const wrap = document.getElementById('formwrap');

            // 1. Basic Validation
            if (!bizName || !email || !password) {
                alert('CRITICAL: Business Name, Email, and Passkey are required.');
                return;
            }

            // 2. Password Length Check (Supabase requires 6 chars)
            if (password.length < 6) {
                alert('CRITICAL: Node Passkey must be at least 6 characters long.');
                return;
            }

            btn.innerText = "AUTHENTICATING...";
            btn.style.pointerEvents = "none";

            // 3. Register User in Auth
            const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
            });

            if (authError) {
                alert(`AUTH ERROR: ${authError.message}`);
                btn.innerText = "Provision Node";
                btn.style.pointerEvents = "auto";
                return;
            }

            // 4. Inject into businesses table
            if (authData.user) {
                btn.innerText = "LINKING LEDGER...";

                const { error: dbError } = await supabaseClient.from('businesses').insert([{
                    auth_id: authData.user.id,
                    business_name: bizName, 
                    tier: tier
                }]);

                if (dbError) {
                    console.error("Ledger Error:", dbError);
                    alert("Auth successful, but failed to write ledger data. Check console.");
                    btn.innerText = "Provision Node";
                    btn.style.pointerEvents = "auto";
                    return;
                }

                // 5. Success Route
                btn.innerText = "NODE SECURED. REROUTING...";
                wrap.classList.add('submitted'); 
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }
        }
    </script>
</body>
</html>
