<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Watchtower Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --black: #080c0f;
            --dark: #0d1318;
            --panel: #111820;
            --panel2: #161f28;
            --border: #1e2d3a;
            --green: #00ff88;
            --green-dim: #00cc6a;
            --green-glow: rgba(0,255,136,0.10);
            --amber: #ffaa00;
            --red: #ff4455;
            --muted: #5a7a8a;
            --text: #c8d8e8;
            --sans: 'Inter', sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--black);
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; box-sizing: border-box; padding-bottom: 40px;
        }

        .terminal-header {
            width: 100%; padding: 14px; background: var(--dark);
            border-bottom: 1px solid var(--border); text-align: center;
            color: var(--green); text-shadow: 0 0 5px var(--green-dim);
            letter-spacing: 2px; font-size: 13px; display:flex; align-items:center; justify-content:space-between; box-sizing:border-box;
        }
        .terminal-header a { color: var(--muted); text-decoration:none; font-size:11px; }

        .friendly-sub {
            max-width: 450px; width: 90%; margin-top: 16px;
            font-family: var(--sans); font-size: 14px; color: var(--muted);
            line-height: 1.6; text-align: center;
        }

        .viewscreen-container {
            position: relative; width: 90%; max-width: 450px; aspect-ratio: 4/3;
            margin: 18px 0; background: var(--panel); border: 1px solid var(--border);
            border-radius: 8px; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        video, #capturedImg { width: 100%; height: 100%; object-fit: cover; display:block; }
        #capturedImg { display: none; }

        .reticle {
            position: absolute; top: 50%; left: 50%; width: 60%; height: 60%;
            border: 1px dashed var(--green-dim); transform: translate(-50%, -50%);
            pointer-events: none; box-shadow: 0 0 10px var(--green-glow);
        }
        .reticle::before, .reticle::after {
            content: ''; position: absolute; width: 10px; height: 10px; border: 2px solid var(--green);
        }
        .reticle::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .reticle::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        .controls { width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 12px; }

        .btn {
            background: var(--panel); border: 1px solid var(--green); color: var(--green);
            padding: 16px; font-family: 'Share Tech Mono', monospace; font-size: 1rem; font-weight: bold;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.15s ease; box-shadow: 0 0 5px var(--green-glow); border-radius: 6px;
        }
        .btn:active { background: var(--green); color: var(--black); box-shadow: 0 0 15px var(--green); }
        .btn.secondary { border-color: var(--border); color: var(--muted); box-shadow:none; }
        .btn.secondary:active { background: var(--panel2); color: var(--text); }
        .btn[disabled] { opacity: .5; pointer-events: none; }

        .console-output {
            background: var(--dark); border: 1px solid var(--border); padding: 10px;
            min-height: 40px; overflow-y: auto; font-size: 0.85rem; color: var(--amber);
            border-radius: 6px;
        }

        /* ---- Coach result panel (resident-friendly, plain English) ---- */
        #resultPanel { display:none; width: 90%; max-width: 450px; font-family: var(--sans); margin-top: 4px; }
        .safety {
            background: rgba(255,68,85,.08); border: 1px solid var(--red); border-radius: 10px;
            padding: 14px; margin-bottom: 12px;
        }
        .safety .tag { font-family:'Share Tech Mono',monospace; font-size:11px; color: var(--red); letter-spacing:.1em; margin-bottom:6px; }
        .safety p { font-size: 14px; color: var(--text); line-height:1.5; margin:0; }

        .summary-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
        .summary-card p { font-size: 14px; line-height: 1.6; color: var(--text); margin:0; }

        .value-row { display:flex; gap:10px; margin-bottom: 12px; }
        .value-box { flex:1; background: var(--panel); border: 1px solid var(--green); border-radius: 10px; padding: 14px; text-align:center; }
        .value-box .amt { font-family:'Share Tech Mono',monospace; font-size: 20px; color: var(--green); font-weight:700; }
        .value-box .lbl { font-size: 10px; color: var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-top:4px; font-family: var(--sans); }

        .tip-card { background: var(--panel2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
        .tip-card .tag { font-family:'Share Tech Mono',monospace; font-size: 10px; color: var(--amber); letter-spacing:.1em; margin-bottom:6px; }
        .tip-card p { font-size: 13px; color: var(--text); line-height: 1.5; margin:0; }

        .items { display:flex; flex-wrap:wrap; gap:8px; margin-bottom: 14px; }
        .items span { background: var(--panel2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 11px; font-size: 12px; color: var(--muted); font-family: var(--sans); }

        .verify-note { margin-top: 6px; text-align:center; font-size:12px; color:var(--muted); font-family: var(--sans); }
        .verify-note button { background:none; border:none; color: var(--green); text-decoration: underline; font-size: 12px; cursor:pointer; font-family: var(--sans); }
    </style>
</head>
<body>

    <div class="terminal-header">
        <span>WATCHTOWER // SCANNER</span>
        <a href="index.html">&#8592; HOME</a>
    </div>

    <p class="friendly-sub">Point your camera at what you've got. We'll tell you what it's worth, how to sort it for more, and flag anything that needs careful handling.</p>

    <div class="viewscreen-container">
        <video id="webcam" autoplay playsinline></video>
        <img id="capturedImg" alt="Captured photo">
        <div class="reticle"></div>
    </div>

    <div class="controls">
        <button class="btn" id="capture-btn">Execute Optical Scan</button>
        <button class="btn secondary" id="retake-btn" style="display:none">Retake Photo</button>
        <div class="console-output" id="console">SYSTEM READY. AWAITING SCAN INPUT...</div>
    </div>

    <div id="resultPanel">
        <div id="safetyBlock" class="safety" style="display:none">
            <div class="tag">&#9888; SAFETY FIRST</div>
            <p id="safetyText"></p>
        </div>
        <div class="summary-card"><p id="summaryText"></p></div>
        <div class="value-row">
            <div class="value-box"><div class="amt" id="valLow">$0</div><div class="lbl">Low estimate</div></div>
            <div class="value-box"><div class="amt" id="valHigh">$0</div><div class="lbl">High estimate</div></div>
        </div>
        <div id="tipBlock" class="tip-card" style="display:none">
            <div class="tag">&#128161; EARN MORE</div>
            <p id="tipText"></p>
        </div>
        <div id="itemsBlock" class="items"></div>
        <div class="verify-note">Think we got it wrong? <button onclick="alert('Coming soon: a direct line to a real person who will re-check this.')">Tell us what it really is</button></div>
    </div>

    <canvas id="snapshot" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const capturedImg = document.getElementById('capturedImg');
        const canvas = document.getElementById('snapshot');
        const captureBtn = document.getElementById('capture-btn');
        const retakeBtn = document.getElementById('retake-btn');
        const consoleLog = document.getElementById('console');
        const resultPanel = document.getElementById('resultPanel');

        function printLog(msg) {
            consoleLog.innerHTML += `<br>&gt; ${msg}`;
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" } }, audio: false
                });
                video.srcObject = stream;
                printLog("CAMERA READY.");
            } catch (err) {
                printLog("BACK CAMERA UNAVAILABLE. TRYING DEFAULT...");
                navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                    .then(stream => { video.srcObject = stream; })
                    .catch(e => printLog("CAMERA ACCESS DENIED. CHECK PERMISSIONS."));
            }
        }

        captureBtn.addEventListener('click', () => {
            if (video.style.display === 'none') return; // already captured, ignore
            printLog("CAPTURING...");
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.85);

            capturedImg.src = dataUrl;
            video.style.display = 'none';
            capturedImg.style.display = 'block';
            captureBtn.textContent = 'Reading Pile...';
            captureBtn.setAttribute('disabled', 'true');
            retakeBtn.style.display = 'block';

            printLog("PHOTO CAPTURED. SENDING FOR ANALYSIS...");
            analyzePayload(dataUrl.split(',')[1]);
        });

        retakeBtn.addEventListener('click', () => {
            video.style.display = 'block';
            capturedImg.style.display = 'none';
            captureBtn.textContent = 'Execute Optical Scan';
            captureBtn.removeAttribute('disabled');
            retakeBtn.style.display = 'none';
            resultPanel.style.display = 'none';
            consoleLog.innerHTML = 'SYSTEM READY. AWAITING SCAN INPUT...';
        });

        async function analyzePayload(base64Image) {
            try {
                const resp = await fetch('/api/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageBase64: base64Image, mediaType: 'image/jpeg' })
                });
                const data = await resp.json();

                if (data.error) {
                    printLog("ERROR: " + data.error);
                    captureBtn.textContent = 'Execute Optical Scan';
                    captureBtn.removeAttribute('disabled');
                    return;
                }

                printLog("ANALYSIS COMPLETE.");
                showResult(data);
            } catch (e) {
                printLog("CONNECTION ERROR. TRY AGAIN.");
                captureBtn.textContent = 'Execute Optical Scan';
                captureBtn.removeAttribute('disabled');
            }
        }

        function showResult(data) {
            if (data.safety_warning) {
                document.getElementById('safetyText').textContent = data.safety_warning;
                document.getElementById('safetyBlock').style.display = 'block';
            } else {
                document.getElementById('safetyBlock').style.display = 'none';
            }
            document.getElementById('summaryText').textContent = data.summary || "Here's what we found.";
            document.getElementById('valLow').textContent = '$' + (data.estimated_value_low ?? 0);
            document.getElementById('valHigh').textContent = '$' + (data.estimated_value_high ?? 0);

            if (data.coaching_tip) {
                document.getElementById('tipText').textContent = data.coaching_tip;
                document.getElementById('tipBlock').style.display = 'block';
            } else {
                document.getElementById('tipBlock').style.display = 'none';
            }

            const itemsBlock = document.getElementById('itemsBlock');
            itemsBlock.innerHTML = '';
            (data.items_seen || []).forEach(item => {
                const s = document.createElement('span');
                s.textContent = item;
                itemsBlock.appendChild(s);
            });

            resultPanel.style.display = 'block';
        }

        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
