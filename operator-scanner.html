<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="operator-auth.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Watchtower Operator Scanner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
:root{--black:#080c0f;--dark:#0d1318;--panel:#111820;--panel2:#161f28;--border:#1e2d3a;--green:#00ff88;--green-dim:#00cc6a;--green-glow:rgba(0,255,136,.10);--amber:#ffaa00;--red:#ff4455;}
*{box-sizing:border-box;}
body{margin:0;background:var(--black);color:#fff;font-family:'Share Tech Mono',monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding-bottom:40px;}
.hdr{width:100%;padding:14px;background:var(--dark);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;color:var(--green);letter-spacing:2px;font-size:13px;}
.hdr a{color:#5a7a8a;text-decoration:none;font-size:11px;}
.view{position:relative;width:90%;max-width:450px;aspect-ratio:4/3;margin:18px 0;background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:inset 0 0 20px rgba(0,0,0,.8);}
video,#capturedImg{width:100%;height:100%;object-fit:cover;display:block;}
#capturedImg{display:none;}
.reticle{position:absolute;top:50%;left:50%;width:70%;height:70%;border:1px dashed var(--amber);transform:translate(-50%,-50%);pointer-events:none;}
.controls{width:90%;max-width:450px;display:flex;flex-direction:column;gap:10px;}
.btn{background:var(--panel);border:1px solid var(--green);color:var(--green);padding:15px;font-family:'Share Tech Mono',monospace;font-size:1rem;font-weight:bold;cursor:pointer;text-transform:uppercase;letter-spacing:1px;border-radius:6px;box-shadow:0 0 5px var(--green-glow);}
.btn:active{background:var(--green);color:var(--black);}
.btn.sec{border-color:var(--border);color:#5a7a8a;box-shadow:none;}
.btn[disabled]{opacity:.5;pointer-events:none;}
.console{background:var(--dark);border:1px solid var(--border);padding:10px;min-height:36px;font-size:.85rem;color:var(--amber);border-radius:6px;}
#result{display:none;width:90%;max-width:450px;margin-top:14px;background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.row{display:flex;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;}
.row:last-child{border-bottom:none;}
.row .k{color:#5a7a8a;letter-spacing:.05em;}
.row .v{color:#fff;font-weight:bold;text-align:right;max-width:60%;}
.actionSTRIP{color:var(--amber);}
.actionSELL{color:var(--green);}
.actionHOLD{color:#5a7a8a;}
.warn{color:var(--red);}
#decision{display:none;width:90%;max-width:450px;margin-top:14px;background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
#result .section-label{display:block;padding:12px 14px 8px;color:var(--amber);font-size:11px;letter-spacing:.12em;}
#decision .section-label{display:block;padding:12px 14px 8px;color:var(--green);font-size:11px;letter-spacing:.12em;}
#decision input,#decision textarea{background:var(--dark);border:1px solid var(--border);color:#fff;font-family:'Share Tech Mono',monospace;font-size:13px;padding:7px 8px;border-radius:4px;width:100%;text-align:right;}
#decision textarea{min-height:58px;resize:vertical;text-align:left;}
#decision .field-row{display:block;}
#decision .field-row .k{display:block;margin-bottom:7px;}
#decisionControls{display:none;width:90%;max-width:450px;margin-top:10px;flex-direction:column;gap:10px;}
#success{display:none;width:90%;max-width:450px;margin-top:14px;background:var(--panel);border:1px solid var(--green);border-radius:8px;padding:18px;text-align:center;}
#success h3{color:var(--green);margin:0 0 10px;letter-spacing:2px;}
#success .btn{margin-top:8px;}
</style>
</head>
<body>
<div class="hdr"><span>OPERATOR // INTAKE GRADE</span><a href="terminal.html">&#8592; TERMINAL</a></div>

<div class="view">
  <video id="webcam" autoplay playsinline></video>
  <img id="capturedImg" alt="captured">
  <div class="reticle"></div>
</div>

<div class="controls">
  <button class="btn" id="capBtn">GRADE LOAD</button>
  <button class="btn sec" id="retakeBtn" style="display:none">RETAKE</button>
  <div class="console" id="console">READY.</div>
</div>

<div id="result"></div>

<div id="decision">
  <span class="section-label">OPERATOR CORRECTION</span>
  <div class="row field-row"><span class="k">MATERIAL</span><input id="materialIn" type="text" autocomplete="off"></div>
  <div class="row field-row"><span class="k">GRADE</span><input id="gradeIn" type="text" autocomplete="off"></div>
  <div class="row field-row"><span class="k">WEIGHT (LB)</span><input id="weightIn" type="number" step="0.1" min="0" inputmode="decimal" placeholder="0.0"></div>
  <div class="row field-row"><span class="k">PRICE/LB ($)</span><input id="priceIn" type="number" step="0.01" min="0" inputmode="decimal"></div>
  <div class="row field-row"><span class="k">NOTES</span><textarea id="notesIn" autocomplete="off"></textarea></div>
  <div class="row"><span class="k">GROSS VALUE</span><span class="v" id="grossOut">$0.00</span></div>
</div>
<div class="controls" id="decisionControls">
  <button class="btn" id="acceptBtn">ACCEPT GRADE</button>
</div>

<div id="success">
  <h3>INTAKE CREATED</h3>
  <div class="row"><span class="k">INTAKE ID</span><span class="v" id="successId"></span></div>
  <div class="row"><span class="k">MATERIAL</span><span class="v" id="successMaterial"></span></div>
  <div class="row"><span class="k">WEIGHT</span><span class="v" id="successWeight"></span></div>
  <div class="row"><span class="k">EST VALUE</span><span class="v" id="successValue"></span></div>
  <button class="btn" type="button" onclick="window.location.href='operations/passport.html'">GENERATE PASSPORT</button>
  <button class="btn sec" type="button" onclick="window.location.href='operations/manifest.html'">ADD TO REVIEW MANIFEST</button>
</div>

<canvas id="snap" style="display:none;"></canvas>

<script>
const sb=window.watchtowerAuth || null;

const video=document.getElementById('webcam'),capImg=document.getElementById('capturedImg'),canvas=document.getElementById('snap');
const capBtn=document.getElementById('capBtn'),retakeBtn=document.getElementById('retakeBtn'),cons=document.getElementById('console'),result=document.getElementById('result');
const decision=document.getElementById('decision'),decisionControls=document.getElementById('decisionControls'),acceptBtn=document.getElementById('acceptBtn');
const materialIn=document.getElementById('materialIn'),gradeIn=document.getElementById('gradeIn'),weightIn=document.getElementById('weightIn'),priceIn=document.getElementById('priceIn'),notesIn=document.getElementById('notesIn'),grossOut=document.getElementById('grossOut');
const success=document.getElementById('success');
let lastGrade=null;
function log(m){cons.innerHTML+='<br>&gt; '+m;cons.scrollTop=cons.scrollHeight;}

async function initCam(){
  try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{exact:'environment'}},audio:false});video.srcObject=s;log('CAMERA READY.');}
  catch(e){navigator.mediaDevices.getUserMedia({video:true,audio:false}).then(s=>video.srcObject=s).catch(()=>log('CAMERA ACCESS DENIED.'));}
}

capBtn.addEventListener('click',()=>{
  if(video.style.display==='none')return;
  log('CAPTURING...');
  const ctx=canvas.getContext('2d');canvas.width=video.videoWidth;canvas.height=video.videoHeight;
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  const dataUrl=canvas.toDataURL('image/jpeg',0.85);
  capImg.src=dataUrl;video.style.display='none';capImg.style.display='block';
  capBtn.textContent='GRADING...';capBtn.setAttribute('disabled','true');retakeBtn.style.display='block';
  grade(dataUrl.split(',')[1]);
});

retakeBtn.addEventListener('click',()=>{
  video.style.display='block';capImg.style.display='none';
  capBtn.textContent='GRADE LOAD';capBtn.removeAttribute('disabled');retakeBtn.style.display='none';
  result.style.display='none';cons.innerHTML='READY.';
  decision.style.display='none';decisionControls.style.display='none';success.style.display='none';
  lastGrade=null;
});

async function grade(b64){
  try{
    const r=await fetch('/api/grade',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageBase64:b64,mediaType:'image/jpeg'})});
    const d=await r.json();
    if(d.error){log('ERROR: '+d.error);capBtn.textContent='GRADE LOAD';capBtn.removeAttribute('disabled');return;}
    log('GRADE COMPLETE.');
    showResult(d);
  }catch(e){log('CONNECTION ERROR.');capBtn.textContent='GRADE LOAD';capBtn.removeAttribute('disabled');}
}

function showResult(d){
  lastGrade=d;
  const lo=Number(d.price_per_lb_usd && d.price_per_lb_usd.low)||0, hi=Number(d.price_per_lb_usd && d.price_per_lb_usd.high)||0;
  const contamList=Array.isArray(d.contamination)?d.contamination.filter(Boolean):[];
  const contaminated=contamList.length>0;
  result.innerHTML = '<span class="section-label">AI SUGGESTION</span>' +
    row('MATERIAL', d.material || 'UNKNOWN') +
    row('GRADE', d.grade || '-') +
    row('CONFIDENCE', d.confidence || '-') +
    row('EST $/LB', '$'+lo.toFixed(2)+' - $'+hi.toFixed(2)) +
    row('CONTAMINATION', contaminated ? contamList.join(', ') : 'NONE NOTED', contaminated ? 'warn' : '') +
    row('NOTES', d.operator_notes || '-');
  result.style.display='block';

  materialIn.value=d.material || '';
  gradeIn.value=d.grade || '';
  weightIn.value='';
  priceIn.value=((lo+hi)/2).toFixed(2);
  notesIn.value=d.operator_notes || '';
  computeGross();
  decision.style.display='block';
  decisionControls.style.display='flex';
  acceptBtn.removeAttribute('disabled');acceptBtn.textContent='ACCEPT GRADE';
  success.style.display='none';
}
function row(k,v,cls){return '<div class="row"><span class="k">'+k+'</span><span class="v '+(cls||'')+'">'+v+'</span></div>';}

function computeGross(){
  const w=parseFloat(weightIn.value)||0, p=parseFloat(priceIn.value)||0;
  grossOut.textContent='$'+(w*p).toFixed(2);
}
weightIn.addEventListener('input',computeGross);
priceIn.addEventListener('input',computeGross);

acceptBtn.addEventListener('click',async()=>{
  if(!lastGrade)return;
  const w=parseFloat(weightIn.value)||0, p=parseFloat(priceIn.value)||0;
  if(w<=0||p<=0){log('ENTER WEIGHT AND PRICE FIRST.');return;}
  if(!sb){log('SAVE ERROR: Supabase client unavailable.');return;}

  acceptBtn.setAttribute('disabled','true');acceptBtn.textContent='SAVING...';

  const { data:sessionData } = await sb.auth.getSession();
  const operatorId = sessionData && sessionData.session && sessionData.session.user ? sessionData.session.user.id : null;
  if(!operatorId){
    log('SAVE ERROR: No operator session.');
    acceptBtn.removeAttribute('disabled');acceptBtn.textContent='ACCEPT GRADE';
    return;
  }

  const contamList=Array.isArray(lastGrade.contamination)?lastGrade.contamination.filter(Boolean):[];
  const gross=w*p;

  const { data, error } = await sb.from('intakes').insert({
    operator: operatorId,
    material: materialIn.value.trim() || null,
    grade: gradeIn.value.trim() || null,
    confidence: lastGrade.confidence || null,
    contamination: contamList.length ? contamList.join(', ') : null,
    notes: notesIn.value.trim() || null,
    weight_lb: w,
    price_per_lb: p,
    gross_value: gross
  }).select().single();

  if(error){
    log('SAVE FAILED: '+error.message);
    acceptBtn.removeAttribute('disabled');acceptBtn.textContent='ACCEPT GRADE';
    return;
  }

  log('INTAKE RECORDED.');
  decision.style.display='none';decisionControls.style.display='none';result.style.display='none';
  document.getElementById('successId').textContent=data.id;
  document.getElementById('successMaterial').textContent=data.material||'UNKNOWN';
  document.getElementById('successWeight').textContent=w.toFixed(1)+' LB';
  document.getElementById('successValue').textContent='$'+gross.toFixed(2);
  success.style.display='block';
});

window.addEventListener('load', async()=>{
  const isOperator=await window.watchtowerOperatorReady;
  if(isOperator) initCam();
});
</script>
</body>
</html>
