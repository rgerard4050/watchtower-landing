<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watchtower Driver View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../operator-auth.js"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="mx-auto max-w-5xl px-4 py-6 sm:px-6 lg:px-8">
      <header class="rounded-2xl border border-slate-800 bg-slate-900/80 p-5 shadow-2xl shadow-black/20">
        <p class="text-xs uppercase tracking-[0.3em] text-amber-400">Driver View</p>
        <h1 class="mt-2 text-2xl font-semibold">Today’s Route</h1>
        <p class="mt-2 text-sm text-slate-400">Review the assigned pickups and confirm each one after collection.</p>
      </header>

      <main class="mt-6 space-y-6">
        <section id="driverSummary" class="rounded-2xl border border-slate-800 bg-slate-900/80 p-5 shadow-2xl shadow-black/20"></section>
        <section id="driverManifests" class="space-y-4"></section>
      </main>
    </div>

    <script src="./driver.js"></script>
  </body>
</html>
