<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watchtower Operations — Reconciliation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../operator-auth.js"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
      <header class="rounded-2xl border border-slate-800 bg-slate-900/80 p-6 shadow-2xl shadow-black/20">
        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <div>
            <p class="text-xs uppercase tracking-[0.3em] text-violet-400">Operations</p>
            <h1 class="mt-2 text-2xl font-semibold">Reconciliation</h1>
            <p class="mt-2 text-sm text-slate-400">Review manifest outcomes and recovery performance on a single surface.</p>
          </div>
          <div class="flex gap-3">
            <a href="./manifest.html" class="rounded-lg border border-slate-700 px-4 py-2 text-sm text-slate-300 hover:border-emerald-400 hover:text-emerald-300">Manifest Intake</a>
            <a href="./learning.html" class="rounded-lg border border-slate-700 px-4 py-2 text-sm text-slate-300 hover:border-emerald-400 hover:text-emerald-300">Historical Learning</a>
          </div>
        </div>
      </header>

      <main class="mt-8 grid gap-8 lg:grid-cols-[0.7fr_1.3fr]">
        <section class="rounded-2xl border border-slate-800 bg-slate-900/80 p-6 shadow-2xl shadow-black/20">
          <h2 class="text-lg font-semibold">Summary</h2>
          <div id="reconcileSummary" class="mt-5 space-y-3 text-sm text-slate-300"></div>
        </section>

        <section class="rounded-2xl border border-slate-800 bg-slate-900/80 p-6 shadow-2xl shadow-black/20">
          <div class="flex items-center justify-between">
            <h2 class="text-lg font-semibold">Manifest Outcomes</h2>
            <button id="refreshReconcile" class="rounded-lg border border-slate-700 px-3 py-2 text-sm text-slate-300 hover:border-violet-400 hover:text-violet-300">Refresh</button>
          </div>
          <div id="reconcileTable" class="mt-5 overflow-x-auto"></div>
        </section>
      </main>
    </div>

    <script src="./ops.js"></script>
  </body>
</html>
